<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">Paseo agent workbench architecture</title>
  <desc id="desc">Paseo connects desktop, web, mobile, and CLI clients to a local daemon that manages coding agents and repositories.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8f8f8"/>
      <stop offset="1" stop-color="#eef2f6"/>
    </linearGradient>
    <filter id="shadow" x="-15%" y="-20%" width="130%" height="150%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#1f2937" flood-opacity="0.16"/>
    </filter>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; fill: #172033; }
      .muted { fill: #667085; font-size: 22px; }
      .label { font-size: 24px; font-weight: 700; }
      .small { font-size: 18px; fill: #667085; }
      .card { fill: #fff; stroke: #d7dde5; stroke-width: 2; filter: url(#shadow); }
      .chip { fill: #f4f7fb; stroke: #d7dde5; stroke-width: 1.5; }
      .arrow { stroke: #536579; stroke-width: 4; fill: none; stroke-linecap: round; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#536579"/>
    </marker>
  </defs>

  <rect width="1200" height="420" rx="34" fill="url(#bg)"/>
  <circle cx="1060" cy="86" r="88" fill="#dce8f5" opacity="0.55"/>
  <circle cx="170" cy="340" r="110" fill="#efe6d6" opacity="0.52"/>

  <text x="70" y="82" font-size="42" font-weight="800">Paseo</text>
  <text x="70" y="120" class="muted">手机、桌面和 CLI 里的 AI 代码工程工作台</text>

  <rect x="70" y="170" width="255" height="150" rx="24" class="card"/>
  <text x="106" y="215" class="label">客户端</text>
  <rect x="106" y="240" width="78" height="38" rx="12" class="chip"/>
  <text x="126" y="265" class="small">手机</text>
  <rect x="196" y="240" width="88" height="38" rx="12" class="chip"/>
  <text x="216" y="265" class="small">桌面</text>
  <rect x="106" y="286" width="78" height="38" rx="12" class="chip"/>
  <text x="126" y="311" class="small">Web</text>
  <rect x="196" y="286" width="88" height="38" rx="12" class="chip"/>
  <text x="221" y="311" class="small">CLI</text>

  <path d="M342 245 C390 245 405 245 446 245" class="arrow"/>

  <rect x="460" y="150" width="280" height="190" rx="28" class="card"/>
  <text x="510" y="204" class="label">Paseo Daemon</text>
  <text x="510" y="242" class="small">任务调度</text>
  <text x="510" y="276" class="small">权限确认</text>
  <text x="510" y="310" class="small">上下文续接</text>

  <path d="M760 245 C805 245 820 245 860 245" class="arrow"/>

  <rect x="875" y="135" width="255" height="220" rx="28" class="card"/>
  <text x="918" y="190" class="label">代码 Agent</text>
  <text x="918" y="230" class="small">Codex</text>
  <text x="918" y="264" class="small">Claude Code</text>
  <text x="918" y="298" class="small">OpenCode</text>

  <path d="M600 352 C600 374 648 382 705 382 H1000 C1048 382 1072 368 1072 342" stroke="#9aa8b6" stroke-width="3" fill="none" stroke-dasharray="9 9"/>
  <text x="725" y="392" class="small">运行在你自己的机器和仓库里</text>
</svg>
